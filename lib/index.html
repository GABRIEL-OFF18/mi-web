<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAGI-AI COMANDOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .command-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .command-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    .cmd { 
      font-family: 'Consolas', 'Courier New', monospace;
      transition: all 0.2s;
    }
    .cmd:hover { background-color: rgb(234 179 8 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Header -->
  <div class="bg-gradient-to-r from-purple-600 via-pink-600 to-rose-500 py-16">
    <div class="max-w-6xl mx-auto text-center px-4">
      <h1 class="text-6xl font-bold mb-3">NAGI-AI</h1>
      <p class="text-2xl opacity-90">Lista completa de comandos • NAGI-Bot-MD</p>
      <p class="mt-3 text-sm opacity-75">Desarrollado por DEV-FEDEX</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-10">

    <!-- Buscador -->
    <div class="mb-10">
      <div class="relative max-w-xl mx-auto">
        <input 
          type="text" 
          id="searchInput"
          placeholder="Buscar comando o categoría..." 
          class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl py-4 px-6 pl-14 focus:outline-none focus:border-purple-500 text-lg"
          onkeyup="filterCommands()">
        <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-zinc-500"></i>
      </div>
    </div>

    <!-- Contenedor de categorías -->
    <div id="categoriesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Se llenará con JavaScript -->
    </div>

  </div>

  <footer class="text-center py-8 text-zinc-500 text-sm border-t border-zinc-800">
    <p>Bot: NAGI-Bot-MD (NAGI-AI)</p>
    <p>
      Canal: 
      <a href="https://whatsapp.com/channel/0029VbCJFHmFy72CvfvzSR0Q" 
         class="text-purple-400 hover:underline" target="_blank">
        Únete al canal oficial
      </a>
    </p>
  </footer>

  <script>
    // ==================== DATOS DE COMANDOS ====================
    const categories = [
      {
        title: "Información",
        icon: "fa-info-circle",
        color: "text-blue-400",
        commands: [
          { cmd: ".menu / .menucompleto", desc: "Muestra el menú completo" },
          { cmd: ".ping / .p", desc: "Velocidad del bot y estado del servidor" },
          { cmd: ".estado", desc: "Información del bot" },
          { cmd: ".creador", desc: "Información del creador" },
          { cmd: ".reporte", desc: "Reportar un error" }
        ]
      },
      {
        title: "Descargas",
        icon: "fa-download",
        color: "text-green-400",
        commands: [
          { cmd: ".play / .ytmp3", desc: "Descargar audio de YouTube" },
          { cmd: ".play2 / .ytmp4", desc: "Descargar video de YouTube (480p)" },
          { cmd: ".tiktok", desc: "Descargar video de TikTok" },
          { cmd: ".tiktokmp3", desc: "Descargar audio de TikTok" },
          { cmd: ".instagram", desc: "Descargar de Instagram" },
          { cmd: ".facebook", desc: "Descargar de Facebook" },
          { cmd: ".spotify", desc: "Descargar de Spotify" }
        ]
      },
      {
        title: "Inteligencia Artificial",
        icon: "fa-brain",
        color: "text-purple-400",
        commands: [
          { cmd: ".ia", desc: "ChatGPT (principal)" },
          { cmd: ".claude", desc: "Claude AI" },
          { cmd: ".remini", desc: "Mejorar calidad de imágenes" }
        ]
      },
      {
        title: "Economía",
        icon: "fa-coins",
        color: "text-yellow-400",
        commands: [
          { cmd: ".cartera / .bal", desc: "Ver tu dinero" },
          { cmd: ".daily", desc: "Recompensa diaria" },
          { cmd: ".trabajar", desc: "Ganar monedas trabajando" },
          { cmd: ".ruleta", desc: "Jugar a la ruleta" },
          { cmd: ".robar", desc: "Robar a alguien" },
          { cmd: ".baltop", desc: "Top de usuarios más ricos" }
        ]
      },
      {
        title: "Diversión",
        icon: "fa-gamepad",
        color: "text-pink-400",
        commands: [
          { cmd: ".8ball", desc: "Bola mágica 8" },
          { cmd: ".waifu", desc: "Imagen random de waifu" },
          { cmd: ".banana", desc: "Medir tamaño de banana" },
          { cmd: ".amistad", desc: "Porcentaje de amistad" },
          { CMD: ".ss", desc:
"captura imaganes de webs con el enlace" },
          { cmd: ".top", desc: "Tops divertidos" }
        ]
      },
      {
        title: "Gacha Waifu",
        icon: "fa-gem",
        color: "text-rose-400",
        commands: [
          { cmd: ".rollwaifu", desc: "Tirar gacha" },
          { cmd: ".claim", desc: "Reclamar waifu" },
          { cmd: ".topwaifu", desc: "Ranking de waifus" }
        ]
      },
      {
        title: "Grupo",
        icon: "fa-users",
        color: "text-cyan-400",
        commands: [
          { cmd: ".kick", desc: "Expulsar usuario" },
          { cmd: ".tagall", desc: "Mencionar a todos" },
          { cmd: ".encuesta", desc: "Crear encuesta" },
          { cmd: ".inactivos", desc: "Ver usuarios inactivos" }
        ]
      },
      {
        title: "Stickers",
        icon: "fa-sticky-note",
        color: "text-orange-400",
        commands: [
          { cmd: ".s / .sticker", desc: "Crear sticker" },
          { cmd: ".brat", desc: "Sticker estilo Brat" }
        ]
      },
      {
        title: "Owner",
        icon: "fa-crown",
        color: "text-red-400",
        ownerOnly: true,
        commands: [
          { cmd: ".update", desc: "Actualizar bot" },
          { cmd: ".restart", desc: "Reiniciar bot" },
          { cmd: ".addcoin", desc: "Añadir monedas" }
        ]
      }
    ];

    // ==================== RENDERIZACIÓN ====================
    function renderCategories(filteredCategories = categories) {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';

      filteredCategories.forEach(cat => {
        const card = document.createElement('div');
        card.className = `command-card bg-zinc-900 rounded-3xl p-6 ${cat.ownerOnly ? 'border border-red-500/30' : ''}`;
        
        card.innerHTML = `
          <h2 class="text-2xl font-bold mb-5 flex items-center gap-3">
            <i class="fas ${cat.icon} ${cat.color}"></i>
            ${cat.title}
            ${cat.ownerOnly ? '<span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded-full">Solo Owner</span>' : ''}
          </h2>
          <ul class="space-y-3">
            ${cat.commands.map(cmd => `
              <li class="cmd group flex items-center justify-between bg-zinc-950 hover:bg-zinc-800 px-4 py-3 rounded-2xl border border-transparent hover:border-yellow-500/30">
                <div>
                  <strong class="text-yellow-400">${cmd.cmd}</strong>
                  <p class="text-zinc-400 text-sm mt-1">${cmd.desc}</p>
                </div>
                <button onclick="copyCommand('${cmd.cmd}')" 
                        class="opacity-0 group-hover:opacity-100 text-zinc-400 hover:text-white transition-all">
                  <i class="fas fa-copy"></i>
                </button>
              </li>
            `).join('')}
          </ul>
        `;
        container.appendChild(card);
      });
    }

    // ==================== FUNCIONES ====================
    function copyCommand(command) {
      navigator.clipboard.writeText(command).then(() => {
        const toast = document.createElement('div');
        toast.className = "fixed bottom-6 right-6 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2";
        toast.innerHTML = `<i class="fas fa-check"></i> Comando copiado: <strong>${command}</strong>`;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.remove(), 2500);
      });
    }

    function filterCommands() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      
      if (!searchTerm) {
        renderCategories(categories);
        return;
      }

      const filtered = categories.map(cat => {
        const filteredCommands = cat.commands.filter(cmd => 
          cmd.cmd.toLowerCase().includes(searchTerm) || 
          cmd.desc.toLowerCase().includes(searchTerm)
        );
        return { ...cat, commands: filteredCommands };
      }).filter(cat => cat.commands.length > 0);

      renderCategories(filtered);
    }

    // Inicializar
    renderCategories();
  </script>
</body>
</html>
