<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌷 Para mi Bachira 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #4a0080 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Candado */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .lock-box {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 3rem;
            border-radius: 30px;
            backdrop-filter: blur(15px);
        }

        .lock-icon { font-size: 5rem; margin-bottom: 1rem; }

        input[type="password"] {
            padding: 15px;
            font-size: 1.5rem;
            width: 220px;
            text-align: center;
            border: none;
            border-radius: 50px;
            margin: 1rem 0;
        }

        /* Contenido */
        .main-content { display: none; padding-top: 80px; }

        .music-player {
            position: fixed;
            top: 120px;
            right: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 220px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #ff4081;
            box-shadow: 0 0 40px rgba(255, 64, 129, 0.6);
            padding: 15px;
            flex-direction: column;
        }

        .center-area {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            padding: 2rem;
        }

        .photos {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .photo-frame {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid #ff80ab;
            box-shadow: 0 15px 40px rgba(255, 128, 171, 0.5);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .snoopy-animation {
            font-size: 6rem;
            margin: 2rem 0;
            animation: hug 2.5s infinite alternate;
            display: inline-block;
        }

        @keyframes hug {
            from { transform: scale(1) rotate(-8deg); }
            to { transform: scale(1.15) rotate(8deg); }
        }

        .message {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem;
            margin: 1.5rem 0;
            line-height: 1.3;
            color: #ff80ab;
        }

        .love-text {
            font-size: 1.5rem;
            margin-top: 1rem;
            color: #ffb3d1;
        }

        /* Reproductor de música */
        #musicPlayer {
            width: 100%;
            max-width: 300px;
            margin: 15px 0;
        }

        #musicPlayer video {
            width: 100%;
            border-radius: 15px;
            background: #000;
        }

        .controls {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Candado -->
    <div id="lock-screen">
        <div class="lock-box">
            <div class="lock-icon">🔒</div>
            <h2>Para mis ojos solamente</h2>
            <p>Ingresa la contraseña</p>
            <input type="password" id="password" placeholder="••••" maxlength="4">
            <br><br>
            <button onclick="unlock()" style="padding:12px 40px; background:#ff4081; border:none; border-radius:50px; color:white; font-size:1.1rem; cursor:pointer;">Desbloquear 💕</button>
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="main-content" id="main">
        <!-- Música redonda -->
        <div class="music-player">
            <div style="text-align:center; width:100%;">
                <h3 style="font-size:1rem; margin-bottom:8px;">🎵 Nuestra canción</h3>
                <input type="text" id="songUrl" value="https://files.catbox.moe/qdp6u1.mp4" 
                       style="background:rgba(255,255,255,0.2); padding:8px; border-radius:20px; width:160px; margin-bottom:10px;">
                
                <div id="musicPlayer">
                    <video id="audioPlayer" controls style="display:none;">
                        Tu navegador no soporta el reproductor de video.
                    </video>
                </div>

                <div class="controls">
                    <button onclick="playMusic()" style="padding:8px 20px; background:#ff4081; border:none; border-radius:20px; color:white; cursor:pointer;">▶ Reproducir</button>
                    <button onclick="pauseMusic()" style="padding:8px 20px; background:#ff4081; border:none; border-radius:20px; color:white; cursor:pointer;">⏸ Pausar</button>
                </div>
            </div>
        </div>

        <div class="center-area">
            <h1 style="font-size:3rem; margin-bottom:1rem;">🌷MY CIELOUS🌷</h1>

            <!-- Primeras dos fotos -->
            <div class="photos">
                <div class="photo-frame">
                    <img src="https://files.catbox.moe/vtpwpy.jpg" alt="Tu foto">
                </div>
                <div class="photo-frame">
                    <img src="https://files.catbox.moe/8aig72.jpg" alt="Foto de tu amiga">
                </div>
            </div>

            <div class="message">
                SIEMPRE SERÁS MI BACHIRA<br>
                DE MI ISAGI 💕✨
            </div>

            <div class="love-text">
                TE QUIERO MUCHO CIELOUS<br>
                Gracias por ser mi mejor amiga
            </div>

            <!-- Dos fotos adicionales -->
            <h2 style="margin: 3rem 0 1.5rem; color:#ff80ab;">Más recuerdos nuestros 💕</h2>
            <div class="photos">
                <div class="photo-frame">
                    <img src="https://via.placeholder.com/260x260/ffb3d1/ffffff?text=FOTO+1" alt="Foto extra 1">
                </div>
                <div class="photo-frame">
                    <img src="https://via.placeholder.com/260x260/ff80ab/ffffff?text=FOTO+2" alt="Foto extra 2">
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAudio = null;

        function unlock() {
            if (document.getElementById('password').value === "2345") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            } else {
                alert("Contraseña incorrecta 💔");
            }
        }

        function playMusic() {
            const url = document.getElementById('songUrl').value.trim();
            const video = document.getElementById('audioPlayer');
            
            if (!url) {
                alert("Pega una URL de música primero 🎵");
                return;
            }

            // Si ya hay un audio reproduciéndose, lo pausamos
            if (currentAudio) {
                currentAudio.pause();
            }

            video.src = url;
            video.style.display = 'block';
            video.play().catch(err => {
                alert("Error al reproducir: " + err.message + "\nAsegúrate de que la URL sea directa a un archivo de audio/video.");
            });
            
            currentAudio = video;
        }

        function pauseMusic() {
            const video = document.getElementById('audioPlayer');
            if (video) {
                video.pause();
            }
        }

        // Pétalos cayendo
        function createPetal() {
            const petal = document.createElement('div');
            petal.textContent = ['🌸','🌷','💕','✨'][Math.floor(Math.random()*4)];
            petal.style.position = 'fixed';
            petal.style.fontSize = '1.8rem';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.top = '-50px';
            petal.style.zIndex = '5';
            document.body.appendChild(petal);

            let y = -50;
            const fall = setInterval(() => {
                y += 3.5;
                petal.style.top = y + 'px';
                if (y > window.innerHeight) petal.remove();
            }, 30);
        }

        setInterval(createPetal, 500);
    </script>
</body>
  </html>
